<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Memory Matching Game</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#5f9cff,#8f5fff);
margin:0;
text-align:center;
color:white;
}

h1{
margin-top:20px;
font-size:3rem;
}

.game-info{
margin:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
background:#ffd700;
font-weight:bold;
margin-top:10px;
}

.memory-game{
width:500px;
margin:30px auto;
display:grid;
gap:15px;
justify-content:center;
}

.card{
width:100px;
height:100px;
perspective:1000px;
cursor:pointer;
}

.card-inner{
width:100%;
height:100%;
position:relative;
transition:transform 0.6s;
transform-style:preserve-3d;
}

.card.flip .card-inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
backface-visibility:hidden;
}

.front{
background:#222;
color:white;
}

.back{
background:white;
color:black;
transform:rotateY(180deg);
}

.end-screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background: linear-gradient(135deg,#5f9cff,#8f5fff);
font-size:2.5rem;
}

</style>

</head>

<body>

<h1>Memory Matching Game</h1>

<div class="game-info">
Level: <span id="level">1</span> |
Moves: <span id="moves">0</span>/<span id="limit">8</span>
</div>

<button onclick="restartLevel()">Restart Level</button>

<div class="memory-game" id="gameBoard"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>

const levels=[
{rows:2,cols:4,limit:8},
{rows:3,cols:4,limit:15},
{rows:4,cols:4,limit:20}
];

const emojis=['🍎','🍌','🍇','🍓','🍉','🥝','🍒','🍍'];

let levelIndex=0;
let moves=0;
let matched=0;

let firstCard,secondCard;
let hasFlipped=false;
let lockBoard=false;

const board=document.getElementById("gameBoard");
const movesDisplay=document.getElementById("moves");
const limitDisplay=document.getElementById("limit");
const levelDisplay=document.getElementById("level");

function startLevel(){

board.innerHTML="";

let {rows,cols,limit}=levels[levelIndex];

board.style.gridTemplateColumns=`repeat(${cols},100px)`;

moves=0;
matched=0;

movesDisplay.textContent=0;
limitDisplay.textContent=limit;
levelDisplay.textContent=levelIndex+1;

let pairs=(rows*cols)/2;

let selected=emojis.slice(0,pairs);
let cards=[...selected,...selected];

cards.sort(()=>0.5-Math.random());

cards.forEach(emoji=>{

const card=document.createElement("div");
card.classList.add("card");

card.innerHTML=`
<div class="card-inner">
<div class="front">?</div>
<div class="back">${emoji}</div>
</div>
`;

card.dataset.emoji=emoji;

card.addEventListener("click",flipCard);

board.appendChild(card);

});

}

function flipCard(){

if(lockBoard || this===firstCard) return;

this.classList.add("flip");

if(!hasFlipped){

hasFlipped=true;
firstCard=this;
return;

}

secondCard=this;

moves++;
movesDisplay.textContent=moves;

if(moves>levels[levelIndex].limit){

setTimeout(gameOver,500);
return;

}

checkMatch();

}

function checkMatch(){

let match=firstCard.dataset.emoji===secondCard.dataset.emoji;

match?disableCards():unflipCards();

}

function disableCards(){

firstCard.removeEventListener("click",flipCard);
secondCard.removeEventListener("click",flipCard);

matched++;

if(matched===(levels[levelIndex].rows*levels[levelIndex].cols)/2){

setTimeout(levelComplete,600);

}

resetBoard();

}

function unflipCards(){

lockBoard=true;

setTimeout(()=>{

firstCard.classList.remove("flip");
secondCard.classList.remove("flip");

resetBoard();

},800);

}

function resetBoard(){

[hasFlipped,lockBoard]=[false,false];
[firstCard,secondCard]=[null,null];

}

function levelComplete(){

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});

if(levelIndex<levels.length-1){

levelIndex++;

setTimeout(startLevel,1000);

}else{

document.body.innerHTML=`
<div class="end-screen">
🏆 You Completed All Levels!
<br><br>
<button onclick="location.reload()">Play Again</button>
</div>
`;

}

}

function gameOver(){

document.body.innerHTML=`
<div class="end-screen">
💀 Game Over
<br>
Move limit exceeded
<br><br>
<button onclick="location.reload()">Try Again</button>
</div>
`;

}

function restartLevel(){

startLevel();

}

startLevel();

</script>

</body>
</html>
